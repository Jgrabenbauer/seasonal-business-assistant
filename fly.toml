app = "sba-mvp"
primary_region = "bos"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"
  STORAGE_PROVIDER = "s3"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks.health]
  port = 3000
  type = "http"
  interval = "15s"
  timeout = "5s"
  path = "/health"

[deploy]
  release_command = "npx prisma migrate deploy"
